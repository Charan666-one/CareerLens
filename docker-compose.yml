version: "3.9"
 
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: careerlens
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
 
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/careerlens
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
 
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
 
volumes:
  postgres_data:
